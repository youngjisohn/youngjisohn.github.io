<script>
var p = new URLSearchParams(window.location.search).get('color');
if (p === 'true') sessionStorage.setItem('color', '1');
if (p === 'false') sessionStorage.removeItem('color');
if (!sessionStorage.getItem('color')) document.body.classList.add('bw');

var btn = document.getElementById('bw-toggle');
// label shows the CURRENT state: color on = color is on, color off = black & white
btn.textContent = document.body.classList.contains('bw') ? 'color off' : 'color on';
btn.onclick = function() {
  document.body.classList.toggle('bw');
  var bw = document.body.classList.contains('bw');
  this.textContent = bw ? 'color off' : 'color on';
  bw ? sessionStorage.removeItem('color') : sessionStorage.setItem('color', '1');
  return false;
};
</script>
