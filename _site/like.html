// --- Rotation picker (shuffle bag: no repeat until the whole pool is shown) ---
function pickRandom(items, key, exclude) {
  var getId = function(item) { return typeof item === 'string' ? item : item.path; };
  var seen = JSON.parse(sessionStorage.getItem(key) || '[]');
  var unseen = items.filter(function(item) { return !seen.includes(getId(item)); });
  if (unseen.length === 0) { seen = []; unseen = items; }
  if (exclude) {
    var filtered = unseen.filter(function(item) { return getId(item) !== exclude; });
    if (filtered.length > 0) unseen = filtered;
  }
  var pick = unseen[Math.floor(Math.random() * unseen.length)];
  seen.push(getId(pick));
  sessionStorage.setItem(key, JSON.stringify(seen));
  return pick;
}

// --- Birds: pick a subfolder from the title menu, then randomize within it ---
if (birds.length > 0) {

  function subfolderOf(path) {
    var rest  = (path.split('assets/birds/')[1] || '');
    var parts = rest.split('/');
    return parts.length > 1 ? parts[0] : '(root)';
  }
  function ytId(url) {
    var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})/);
    return m ? m[1] : null;
  }
  function folderLabel(g) {
    return g === '(root)' ? 'misc' : g.replace(/[-_]+/g, ' ');
  }

  var groups = {};
  birds.forEach(function(b) {
    var g = subfolderOf(b.path);
    (groups[g] = groups[g] || []).push(b);
  });
  var groupNames = Object.keys(groups);

  var birdsHeader = document.getElementById('birds-header');
  var birdsLabel  = document.getElementById('birds-label');
  var birdsMenu   = document.getElementById('birds-menu');
  var box      = document.getElementById('birds-box');
  var img      = document.getElementById('random-img');
  var vid      = document.getElementById('random-vid');
  var ytWrap   = document.getElementById('yt-wrap');
  var ytFrame  = document.getElementById('yt-frame');
  var controls = document.getElementById('bird-controls');
  var soundBtn = document.getElementById('bird-sound');
  var nextBtn  = document.getElementById('bird-next');

  var currentPath = null;
  var currentKind = 'image';
  var prefetchedGroup = null;
  var wantSound = false;
  var skipCount = 0;            // guards against looping over unparseable .txt files

  // current subfolder (persists across reloads); default to a random one
  var currentGroup = sessionStorage.getItem('currentGroup');
  if (!currentGroup || !groups[currentGroup]) {
    currentGroup = groupNames[Math.floor(Math.random() * groupNames.length)];
    sessionStorage.setItem('currentGroup', currentGroup);
  }

  function pickInGroup(lastPath) {
    return pickRandom(groups[currentGroup], 'seenGroup:' + currentGroup, lastPath);
  }

  // for the "next" button / image click: stay in the folder until it's exhausted,
  // then jump to a different folder at random (menu selection stays put instead)
  function pickNext(lastPath) {
    var sg = JSON.parse(sessionStorage.getItem('seenGroup:' + currentGroup) || '[]');
    var hasUnseen = groups[currentGroup].some(function(b) { return sg.indexOf(b.path) === -1; });
    if (!hasUnseen) {
      currentGroup = pickRandom(groupNames, 'seenGroups', currentGroup);
      sessionStorage.setItem('currentGroup', currentGroup);
      highlightMenu();
    }
    return pickRandom(groups[currentGroup], 'seenGroup:' + currentGroup, lastPath);
  }

  function prefetchGroup(name) {
    if (prefetchedGroup === name) return;
    prefetchedGroup = name;
    (groups[name] || []).forEach(function(b) { fetch(b.path).catch(function(){}); });
  }

  function sizePage() {
    var w = this.naturalWidth  || this.videoWidth;
    var h = this.naturalHeight || this.videoHeight;
    document.querySelector('.page-wrapper').style.maxWidth = (w > h) ? '800px' : '500px';
  }

  function updateSoundLabel() {
    soundBtn.innerHTML = wantSound ? '&#128266; sound on' : '&#128263; sound off';
  }
  function applySound() {
    if (currentKind === 'video') {
      vid.muted = !wantSound;
    } else if (currentKind === 'youtube') {
      var func = wantSound ? 'unMute' : 'mute';
      try {
        ytFrame.contentWindow.postMessage(
          JSON.stringify({ event: 'command', func: func, args: [] }), '*');
      } catch (e) {}
    }
  }

  function stopLocalVideo() {
    vid.pause(); vid.removeAttribute('src'); vid.load(); vid.style.display = 'none';
  }
  function stopYoutube() {
    ytFrame.removeAttribute('src'); ytWrap.style.display = 'none';
  }

  function show(bird) {
    currentPath = bird.path;
    var isVideo   = /\.(mp4|mov)$/i.test(bird.path);
    var isYoutube = /\.txt$/i.test(bird.path);

    if (isYoutube) {
      currentKind = 'youtube';
      img.style.display = 'none';
      stopLocalVideo();
      box.style.cursor = 'default';
      box.removeAttribute('title');
      fetch(bird.path)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + bird.path);
          return r.text();
        })
        .then(function(txt) {
          var id = ytId(txt.trim());
          if (!id) {
            console.warn('like.html: no YouTube id in ' + bird.path + ' — got:', JSON.stringify(txt.slice(0, 120)));
            if (skipCount++ < birds.length) advance(); else stopYoutube();
            return;
          }
          skipCount = 0;
          ytFrame.onload = function() {
            // some browsers ignore the autoplay param; nudge it via the iframe API
            try {
              ytFrame.contentWindow.postMessage(
                JSON.stringify({ event: 'command', func: 'playVideo', args: [] }), '*');
            } catch (e) {}
            applySound();
          };
          ytFrame.src = 'https://www.youtube.com/embed/' + id +
            '?autoplay=1&mute=1&loop=1&playlist=' + id + '&rel=0&playsinline=1&enablejsapi=1';
          ytWrap.style.display = '';
          controls.style.display = '';
          updateSoundLabel();
          document.querySelector('.page-wrapper').style.maxWidth = '800px';
        })
        .catch(function(err) {
          console.warn('like.html: could not load ' + bird.path, err);
          if (skipCount++ < birds.length) advance(); else stopYoutube();
        });

    } else if (isVideo) {
      currentKind = 'video';
      skipCount = 0;
      img.style.display = 'none';
      stopYoutube();
      box.style.cursor = 'default';
      box.removeAttribute('title');
      vid.src = bird.path;
      vid.muted = !wantSound;
      vid.style.display = '';
      vid.onloadedmetadata = sizePage;
      controls.style.display = '';
      updateSoundLabel();

    } else { // image
      currentKind = 'image';
      skipCount = 0;
      stopLocalVideo();
      stopYoutube();
      controls.style.display = 'none';
      box.style.cursor = 'pointer';
      box.title = 'click for the next one';
      img.src = bird.path;
      img.style.display = '';
      img.onload = sizePage;
    }
    prefetchGroup(currentGroup);
  }

  function advance() { show(pickNext(currentPath)); }

  // ---- subfolder menu (built only when there's more than one folder) ----
  function highlightMenu() {
    Array.prototype.forEach.call(birdsMenu.children, function(b) {
      if (b.getAttribute('data-group') === currentGroup) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
  if (groupNames.length > 1) {
    groupNames.forEach(function(g) {
      var b = document.createElement('span');
      b.className = 'bird-folder';
      b.textContent = folderLabel(g);
      b.setAttribute('data-group', g);
      b.addEventListener('click', function(e) {
        e.stopPropagation();
        currentGroup = g;
        sessionStorage.setItem('currentGroup', g);
        highlightMenu();
        birdsMenu.style.display = 'none';   // close the menu after choosing
        show(pickInGroup(currentPath));     // fresh draw, never the one already shown
      });
      birdsMenu.appendChild(b);
    });
    birdsLabel.style.cursor = 'pointer';
    birdsLabel.title = 'choose a folder';
    birdsLabel.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = birdsMenu.style.display !== 'none';
      birdsMenu.style.display = open ? 'none' : '';
      if (!open) highlightMenu();
    });
  }

  // ---- interactions ----
  box.addEventListener('click', function() {            // images advance on click
    if (currentKind === 'image') advance();
  });
  nextBtn.addEventListener('click', function(e) {       // video/YouTube advance via button
    e.stopPropagation();
    advance();
  });
  soundBtn.addEventListener('click', function(e) {      // sound on/off
    e.stopPropagation();
    wantSound = !wantSound;
    applySound();
    updateSoundLabel();
  });

  show(pickInGroup(null));                              // first item on load

} else {
  document.getElementById('birds-header').style.display = 'none';
  document.getElementById('birds-box').style.display = 'none';
}

// --- PDF first-page preview ---
var PDFJS_SRC    = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
var PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
var pdfLibPromise = null;

function loadPdfLib() {
  if (pdfLibPromise) return pdfLibPromise;
  pdfLibPromise = new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = PDFJS_SRC;
    s.onload = function() {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      resolve(window.pdfjsLib);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return pdfLibPromise;
}

function renderPdfPreview(url, mountBefore) {
  loadPdfLib()
    .then(function(lib) { return lib.getDocument(url).promise; })
    .then(function(pdf) { return pdf.getPage(1); })
    .then(function(page) {
      var base = page.getViewport({ scale: 1 });
      var viewport = page.getViewport({ scale: 900 / base.width });

      var canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.cssText =
        'width:100%; height:auto; ' +
        'border:2px solid #555; display:block; margin:0 auto 10px auto;';

      var link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.appendChild(canvas);
      mountBefore.parentNode.insertBefore(link, mountBefore);

      return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
    })
    .catch(function() {});
}

// --- Snippets: click the title to load the next one (random, no repeat until all shown) ---
if (snippets.length > 0) {
  var header = document.getElementById('snippet-header');
  var sbox = document.getElementById('snippet-box');
  var currentSnippet = null;

  function showSnippet(path) {
    currentSnippet = path;
    fetch(path)
      .then(function(r) { return r.text(); })
      .then(function(t) {
        var m = t.match(/<!--\s*title:\s*([\s\S]+?)-->/);
        var title = m
          ? m[1].trim()
          : path.split('/').pop().replace(/\.html$/i, '').replace(/[-_]/g, ' ');
        var content = t.replace(/<!--\s*title:[\s\S]+?-->/, '').trim();

        header.textContent = title;
        sbox.innerHTML = content;
        header.style.display = '';
        sbox.style.display = '';

        var pdfLink = sbox.querySelector('a[href$=".pdf" i]');
        if (pdfLink) {
          renderPdfPreview(pdfLink.getAttribute('href'), sbox.firstChild);
        }

        var next = pickRandom(snippets, 'seenSnippets', path);
        sessionStorage.setItem('nextSnippet', next);
        fetch(next).catch(function(){});
      })
      .catch(function() {
        header.style.display = 'none';
        sbox.style.display = 'none';
      });
  }

  function advanceSnippet() {
    var next = sessionStorage.getItem('nextSnippet');
    if (next) { sessionStorage.removeItem('nextSnippet'); }
    else { next = pickRandom(snippets, 'seenSnippets', currentSnippet); }
    showSnippet(next);
  }

  var first = sessionStorage.getItem('nextSnippet');
  if (first) { sessionStorage.removeItem('nextSnippet'); }
  else { first = pickRandom(snippets, 'seenSnippets'); }
  showSnippet(first);

  if (snippets.length > 1) {
    header.style.cursor = 'pointer';
    header.title = 'click for the next one';
    header.addEventListener('click', advanceSnippet);
  }
}
