<script>
(function(){
  var link = document.getElementById('e-link');
  var loaded = null;       // closure — never assigned to a DOM node
  var revertTimer = null;  // handle for the "copied!" → "click to copy" revert

  link.addEventListener('click', async function(ev) {
    ev.preventDefault();
    if (!ev.isTrusted) return;        // reject synthetic clicks

    // rapid-click: cancel any pending revert from a previous copy
    clearTimeout(revertTimer);

    if (!loaded) {
      try {
        const res = await fetch('/contact-token/' + Date.now(), {
          credentials: 'same-origin',
          headers: { 'X-Requested-With': 'click' }
        });
        if (!res.ok) return;
        const parts = (await res.text()).trim().split(' ');
        if (parts.length < 2) return;
        loaded = parts[0] + '@' + parts[1];
      } catch (e) { return; }
    }

    try { await navigator.clipboard.writeText(loaded); } catch (e) { /* still show feedback */ }

    link.textContent = 'copied!';
    link.style.color = '#c00';
    revertTimer = setTimeout(function() {
      link.textContent = 'click to copy';
      link.style.color = '';
    }, 3000);
  });
})();
</script>
