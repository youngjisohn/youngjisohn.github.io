  if(!this._ready) return false;
  clearTimeout(this._t);
  var e=this._e;
  navigator.clipboard.writeText(e);
  this.textContent='copied!';
  this.style.color='#c00';
  var el=this;
  window._eRevealed=true;
  this._t=setTimeout(function(){el.textContent=e; el.style.color='';},3000);
  return false;
">loading...</a>

<script>
(function(){
  var link = document.getElementById('e-link');
  function startTimer() {
    if (document.visibilityState === 'visible') {
      setTimeout(function() {
        fetch('/assets/c.txt')
          .then(function(res) { return res.text(); })
          .then(function(t) {
            var parts = t.trim().split(' ');
            var e = parts[0] + '@' + parts[1];
            link._e = e;
            link._ready = true;
            link.textContent = 'click to copy';
            link.addEventListener('mouseenter', function() {
              if (!window._eRevealed) link.textContent = e;
            });
            link.addEventListener('mouseleave', function() {
              if (!window._eRevealed && link.textContent !== 'copied!') link.textContent = 'click to copy';
            });
          });
      }, 5000);
    } else {
      document.addEventListener('visibilitychange', function handler() {
        if (document.visibilityState === 'visible') {
          document.removeEventListener('visibilitychange', handler);
          startTimer();
        }
      });
    }
  }
  startTimer();
})();
</script>
