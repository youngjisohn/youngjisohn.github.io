<script>
// "contact" -> click reveals the address -> click copies it ("copied!")
(function(){
  var link = document.getElementById('e-link');
  var email = null;
  var copied = false;          // is the "copied!" message currently showing?
  var revertTimer = null;

  function showEmail(){
    clearTimeout(revertTimer);
    copied = false;
    link.textContent = email;
    link.style.color = '';
  }

  function flashCopied(){
    clearTimeout(revertTimer);
    copied = true;
    link.textContent = 'copied!';
    link.style.color = '#c00';
    revertTimer = setTimeout(showEmail, 3000);   // auto-revert if left alone
  }

  link.addEventListener('click', function(ev){
    ev.preventDefault();
    if (!ev.isTrusted) return;

    // Click 1 — fetch and reveal.
    if (!email) {
      fetch('/assets/c.txt')
        .then(function(r){ return r.text(); })
        .then(function(t){
          var parts = t.trim().split(' ');
          email = parts[0] + '@' + parts[1];
          link.textContent = email;
        });
      return;
    }

    // While "copied!" is showing — click dismisses it back to the address.
    if (copied) { showEmail(); return; }

    // Otherwise — copy.
    navigator.clipboard.writeText(email).then(flashCopied, flashCopied);
  });
})();
</script>
