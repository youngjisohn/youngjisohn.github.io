  } else {

<script>
(function(){
  var link = document.getElementById('email-link');
  var hovered = false;

  function buildEmail() {
    if (link._ready) return;
    var e = 'lbhatwv.fbua@jnejvpx.np.hx'.replace(/[a-zA-Z]/g, function(c) {
      return String.fromCharCode((c <= 'Z' ? 90 : 122) >= (c = c.charCodeAt(0) + 13) ? c : c - 26);
    });
    link._e = e;
    link._ready = true;
    link.textContent = e;
    link.title = 'click to copy';
  }

  document.addEventListener('mousemove', function() { hovered = true; }, { once: true });
  document.addEventListener('touchstart', function() { hovered = true; }, { once: true });

  function startTimer() {
    if (document.visibilityState === 'visible') {
      setTimeout(function() {
        if (hovered) {
          buildEmail();
        } else {
          document.addEventListener('mousemove', buildEmail, { once: true });
          document.addEventListener('touchstart', buildEmail, { once: true });
        }
      }, 5000);
    } else {
      document.addEventListener('visibilitychange', function handler() {
        if (document.visibilityState === 'visible') {
          document.removeEventListener('visibilitychange', handler);
          startTimer();
        }
      });
    }
  }
  startTimer();
})();
</script>
