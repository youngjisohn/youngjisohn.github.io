<script>
(function(){
  var link = document.getElementById('e-link');
  var armed = false;
  var ready = false;
  var email = null;
  var revertTimer = null;

  function arm(){
    if (armed) return;
    armed = true;
    setTimeout(function(){
      ready = true;
      link.textContent = 'click to reveal';
      link.title = 'click to copy';
    }, 5000);
  }

  function loadE(){
    return fetch('/assets/c.txt')
      .then(function(r){ return r.text(); })
      .then(function(t){
        var parts = t.trim().split(' ');
        email = parts[0] + '@' + parts[1];
        return email;
      });
  }

  function flashCopied(){
    clearTimeout(revertTimer);
    link.textContent = 'copied!';
    link.style.color = '#c00';
    revertTimer = setTimeout(function(){
      link.textContent = email;
      link.style.color = '';
    }, 3000);
  }

  link.addEventListener('click', function(ev){
    ev.preventDefault();
    if (!ev.isTrusted || !ready) return;

    // Already loaded — synchronous copy path.
    if (email) {
      navigator.clipboard.writeText(email).then(flashCopied, function(){});
      return;
    }

    // First click — fetch + reveal + copy. ClipboardItem accepts a Promise,
    // so the clipboard.write call happens inside the click handler (keeping
    // user activation valid) and the content is supplied once fetch resolves.
    if (typeof ClipboardItem !== 'undefined' && navigator.clipboard.write) {
      var blobP = loadE().then(function(e){
        link.textContent = e;
        return new Blob([e], { type: 'text/plain' });
      });
      try {
        navigator.clipboard.write([new ClipboardItem({ 'text/plain': blobP })])
          .then(flashCopied, function(){});
        return;
      } catch(e) { /* fall through */ }
    }

    // Fallback: fetch then writeText.
    loadE().then(function(e){
      link.textContent = e;
      navigator.clipboard.writeText(e).then(flashCopied, flashCopied);
    });
  });

  // Arm on first user interaction anywhere on the page.
  document.addEventListener('mousemove',  arm, { once: true, passive: true });
  document.addEventListener('touchstart', arm, { once: true, passive: true });
  document.addEventListener('keydown',    arm, { once: true });
})();
</script>
