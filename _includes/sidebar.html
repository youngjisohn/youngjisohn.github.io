<script>
// "contact" -> click reveals the address -> click again copies it.
(function(){
  var link = document.getElementById('e-link');
  var email = null;
  var revertTimer = null;

  // show "copied!" briefly, then go back to showing the address
  function flashCopied(){
    clearTimeout(revertTimer);
    link.textContent = 'copied!';
    link.style.color = '#c00';
    revertTimer = setTimeout(function(){
      link.textContent = email;
      link.style.color = '';
    }, 3000);
  }

  link.addEventListener('click', function(ev){
    ev.preventDefault();
    if (!ev.isTrusted) return;

    // Click 1 — fetch and reveal.
    if (!email) {
      fetch('/assets/c.txt')
        .then(function(r){ return r.text(); })
        .then(function(t){
          var parts = t.trim().split(' ');
          email = parts[0] + '@' + parts[1];
          link.textContent = email;
        });
      return;
    }

    // Click 2+ — copy.
    navigator.clipboard.writeText(email).then(flashCopied, flashCopied);
  });
})();
</script>
