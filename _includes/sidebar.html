<script>
(function(){
  var link = document.getElementById('e-link');
  var armed = false;
  var ready = false;
  var clicks = 0;
  var email = null;
  var revertTimer = null;

  function arm(){
    if (armed) return;
    armed = true;
    setTimeout(function(){
      ready = true;
      link.textContent = 'contact';
      link.title = '';
    }, 3000);
  }

  function showThenRevert(text, revertTo, ms){
    clearTimeout(revertTimer);
    link.textContent = text;
    revertTimer = setTimeout(function(){
      link.textContent = revertTo;
      link.style.color = '';
    }, ms);
  }

  function flash(afterText){
    clearTimeout(revertTimer);
    link.textContent = '!!!';
    link.style.color = '#c00';
    revertTimer = setTimeout(function(){
      link.textContent = afterText;
      link.style.color = '';
    }, 3000);
  }

  link.addEventListener('click', function(ev){
    ev.preventDefault();
    if (!ev.isTrusted || !ready) return;

    clicks++;

    // Click 1, 2 — show !/!!, no fetch, no copy. Revert to "contact" after 2s.
    if (clicks === 1) { showThenRevert('!',  'contact', 2000); return; }
    if (clicks === 2) { showThenRevert('!!', 'contact', 2000); return; }

    // Click 3 — fetch, reveal, copy. ClipboardItem accepts a Promise so the
    // clipboard.write fires inside the click handler (keeping user activation)
    // while fetch resolves.
    if (clicks === 3) {
      if (typeof ClipboardItem !== 'undefined' && navigator.clipboard.write) {
        var blobP = fetch('/assets/c.txt')
          .then(function(r){ return r.text(); })
          .then(function(t){
            var parts = t.trim().split(' ');
            email = parts[0] + '@' + parts[1];
            return new Blob([email], { type: 'text/plain' });
          });
        try {
          navigator.clipboard.write([new ClipboardItem({ 'text/plain': blobP })])
            .then(function(){ flash(email); }, function(){ flash(email); });
          return;
        } catch(e) { /* fall through */ }
      }
      // Fallback.
      fetch('/assets/c.txt')
        .then(function(r){ return r.text(); })
        .then(function(t){
          var parts = t.trim().split(' ');
          email = parts[0] + '@' + parts[1];
          navigator.clipboard.writeText(email).then(
            function(){ flash(email); },
            function(){ flash(email); }
          );
        });
      return;
    }

    // Click 4+ — copy, flash, settle on email.
    navigator.clipboard.writeText(email).then(
      function(){ flash(email); },
      function(){ flash(email); }
    );
  });

  document.addEventListener('mousemove',  arm, { once: true, passive: true });
  document.addEventListener('touchstart', arm, { once: true, passive: true });
  document.addEventListener('keydown',    arm, { once: true });
})();
</script>
